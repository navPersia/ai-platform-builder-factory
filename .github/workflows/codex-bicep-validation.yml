name: Codex Bicep Validation Improvement

on:
  workflow_dispatch:
    inputs:
      bicep_scope:
        description: Bicep modules, validation issue, or infrastructure area to improve.
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-bicep-validation:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
      BRANCH_NAME: codex/bicep-validation-${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Codex branch
        run: git switch -c "$BRANCH_NAME"

      - name: Validate Codex authentication
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${CODEX_API_KEY:-}" ]; then
            echo "Set OPENAI_API_KEY or CODEX_API_KEY as a repository or organization secret."
            exit 1
          fi

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex Bicep validation improvement
        env:
          BICEP_SCOPE: ${{ inputs.bicep_scope }}
        run: |
          {
            printf '# Codex Bicep Validation Improvement Prompt\n\n'
            printf 'Inspect Bicep and infrastructure validation for the requested scope. Improve validation, modules, or documentation as needed. Follow codex/AGENTS.md. Do not deploy. Do not hardcode secrets.\n'
            printf '\n\n## Engineering Standards\n'
            cat codex/AGENTS.md
            printf '\n\n## Bicep Scope\n%s\n' "$BICEP_SCOPE"
          } | codex exec --cd "$GITHUB_WORKSPACE" --sandbox workspace-write --output-last-message codex-bicep-validation-result.md -

      - name: Commit Codex output
        id: commit
        run: |
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            git add .
            git commit -m "Improve Bicep validation with Codex"
            git push origin "$BRANCH_NAME"
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open draft pull request
        if: steps.commit.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --draft \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH_NAME" \
            --title "Codex Bicep validation improvement" \
            --body-file codex-bicep-validation-result.md
