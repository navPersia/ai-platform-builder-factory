name: Codex Repository Review

on:
  workflow_dispatch:
    inputs:
      review_context:
        description: Optional additional review instructions for Codex.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-repo-review:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
      BRANCH_NAME: codex/repo-review-${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Codex branch
        run: git switch -c "$BRANCH_NAME"

      - name: Validate Codex authentication
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${CODEX_API_KEY:-}" ]; then
            echo "Set OPENAI_API_KEY or CODEX_API_KEY as a repository or organization secret."
            exit 1
          fi

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex repository review
        env:
          REVIEW_CONTEXT: ${{ inputs.review_context }}
        run: |
          {
            cat codex/prompts/review-repo.md
            printf '\n\n## Engineering Standards\n'
            cat codex/AGENTS.md
            if [ -n "$REVIEW_CONTEXT" ]; then
              printf '\n\n## Additional Review Context\n%s\n' "$REVIEW_CONTEXT"
            fi
          } | codex exec --cd "$GITHUB_WORKSPACE" --sandbox workspace-write --output-last-message codex-repo-review-result.md -

      - name: Commit Codex output
        id: commit
        run: |
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            git add .
            git commit -m "Run Codex repository review"
            git push origin "$BRANCH_NAME"
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open draft pull request
        if: steps.commit.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --draft \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH_NAME" \
            --title "Codex repository review" \
            --body-file codex-repo-review-result.md
