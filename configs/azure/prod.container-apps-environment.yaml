complianceNotes:
  - Existing tags do not include required owner and createdBy values from specs/resource-groups.md.
  - Existing public network access is enabled on Container Apps, Service Bus, Log Analytics, and ACR; future changes should justify public exposure or move toward private access.
  - ACR admin user is enabled; future remediation should prefer Managed Identity and disable admin credentials.
  - Existing shared resource group rg-arca-prod does not follow the new rg-ai and rg-network split; migration requires explicit approval.

